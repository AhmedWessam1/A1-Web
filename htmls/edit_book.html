<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/nav.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/signup-login.css">
    <title>Edit Book</title>
</head>
<body>
    <div class="nav">
        <div class="nav-col">
            <h2><a href="home.html">Bookify <span>library</span></a></h2>
        </div>
        <div class="nav-col">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="sign-up.html">Sign Up</a>
                </li>
                <li class="nav-item">
                    <a href="login.html">Login</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="wrapper-full">
        <div class="wrapper">
            <div class="text-center">
                <h1 class="title">Edit Book</h1>
            </div>
            <div class="text-center">
                <form action="admin_dashboard.html" method="post">
                    
                    <div>
                        <label for="book-id" class="text-color-white">Book ID</label>
                        <div class="mt-3px">
                            <input type="text" name="book-id" id="book-id" class="input" value="102" readonly>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <label for="book-name" class="text-color-white">Book Name</label>
                        <div class="mt-3px">
                            <input type="text" name="book-name" id="book-name" class="input" value="Clean Code" required>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <label for="author" class="text-color-white">Author</label>
                        <div class="mt-3px">
                            <input type="text" name="author" id="author" class="input" value="Robert C. Martin" required>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <label for="category" class="text-color-white">Category</label>
                        <div class="mt-3px">
                            <input type="text" name="category" id="category" class="input" value="Programming" required>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <label for="description" class="text-color-white">Description</label>
                        <div class="mt-3px">
                            <textarea name="description" id="description" class="input" rows="4" required>Software development book</textarea>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <button type="submit" class="submit">Save Changes</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
