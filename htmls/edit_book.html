<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/nav.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/signup-login.css">
    <title>Edit Book</title>
</head>
<body>
    <div class="nav">
        <div class="nav-col">
            <h2><a href="home.html">Bookify <span>library</span></a></h2>
        </div>
        <div class="nav-col">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="sign-up.html">Sign Up</a>
                </li>
                <li class="nav-item">
                    <a href="login.html">Login</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="wrapper-full">
        <div class="wrapper">
            <div class="text-center">
                <h1 class="title">Edit Book</h1>
            </div>
            <div class="text-center">
                <form id="editBookForm" onsubmit="updateBook(event)">
                    
            
                    
                    <div>
                        <label for="book-name" class="text-color-white">Book Name</label>
                        <div class="mt-3px">
                            <input type="text" id="book-name" class="input" required>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <label for="author" class="text-color-white">Author</label>
                        <div class="mt-3px">
                            <input type="text" id="author" class="input" required>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <label for="category" class="text-color-white">Category</label>
                        <div class="mt-3px">
                            <input type="text" id="category" class="input" required>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <label for="description" class="text-color-white">Description</label>
                        <div class="mt-3px">
                            <textarea id="description" class="input" rows="4" required></textarea>
                        </div>
                    </div>
                    <br>
                    
                    <div>
                        <button type="submit" class="submit">Save Changes</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
    <script src="../scripts/app.js"></script>
    <script>
document.addEventListener("DOMContentLoaded", function () {
    initializeEditBookPage();
});
</script>
</body>
</html>
